# Opale web — SPA statique + proxy API (même origine : pas de CORS).
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # L'API Go (service « api » du docker-compose).
    location /v1/ {
        proxy_pass http://api:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # L'export ZIP peut être volumineux.
        proxy_read_timeout 120s;
        client_max_body_size 20m;
    }
    location = /healthz {
        proxy_pass http://api:8080;
    }

    # SPA : toute route inconnue retombe sur index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Les assets fingerprints peuvent être mis en cache agressivement.
    location /_app/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }
}
