name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    name: Backend Go
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache-dependency-path: backend/go.sum

      - name: Vérifier go.mod
        run: go mod tidy && git diff --exit-code go.mod go.sum

      - name: Vet
        run: go vet ./...

      - name: Tests
        run: go test -race ./...

      - name: Build
        run: go build ./...
