# Opale iOS — définition du projet Xcode (générée par XcodeGen).
# `xcodegen generate` depuis ce dossier produit Opale.xcodeproj.
name: Opale
options:
  bundleIdPrefix: app.opale
  deploymentTarget:
    iOS: "26.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    # Isolation MainActor par défaut (modèle des templates Xcode 26) :
    # simplifie la concurrence pour une app UI.
    SWIFT_DEFAULT_ACTOR_ISOLATION: MainActor
    SWIFT_APPROACHABLE_CONCURRENCY: YES
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: 0.1.0

targets:
  Opale:
    type: application
    platform: iOS
    sources:
      - Opale
    dependencies:
      - target: OpaleWidget
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.opale.ios
        TARGETED_DEVICE_FAMILY: "1"          # iPhone d'abord (P1)
        INFOPLIST_KEY_UISupportedInterfaceOrientations: UIInterfaceOrientationPortrait
        CODE_SIGN_ENTITLEMENTS: Opale/Opale.entitlements
    info:
      path: Opale/Info.plist
      properties:
        CFBundleDisplayName: Opale
        UILaunchScreen: {}
        # Autorise l'API locale (simulateur → localhost, homelab en LAN).
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
        # Face ID (ENF-004) et rafraîchissement d'alertes en arrière-plan.
        NSFaceIDUsageDescription: "Déverrouiller Opale sans ressaisir ton code."
        BGTaskSchedulerPermittedIdentifiers:
          - app.opale.ios.refresh
        UIBackgroundModes:
          - fetch

  # Widget « Patrimoine net » (P7) : lit un instantané écrit par l'app dans
  # l'App Group — aucun réseau, aucun secret côté widget.
  OpaleWidget:
    type: app-extension
    platform: iOS
    sources:
      - OpaleWidget
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.opale.ios.widget
        CODE_SIGN_ENTITLEMENTS: OpaleWidget/OpaleWidget.entitlements
        SKIP_INSTALL: YES
    info:
      path: OpaleWidget/Info.plist
      properties:
        CFBundleDisplayName: Opale
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension

  OpaleUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - OpaleUITests
    dependencies:
      - target: Opale
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.opale.uitests
        GENERATE_INFOPLIST_FILE: YES
        # XCTestCase impose des init nonisolated — pas d'isolation par défaut ici.
        SWIFT_DEFAULT_ACTOR_ISOLATION: nonisolated

schemes:
  Opale:
    build:
      targets:
        Opale: all
        OpaleUITests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - OpaleUITests
